{% include base_path %}

<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="greedy-nav">
        <button><div class="navicon"></div></button>
        <ul class="visible-links">
          <li class="masthead__menu-item masthead__menu-item--lg persist">
            <a href="{{ base_path }}/" data-i18n-key="site_title">{{ site.title }}</a>
          </li>
          {% for link in site.data.navigation.main %}
            {% if link.url contains 'http' %}
              {% assign domain = '' %}
            {% else %}
              {% assign domain = base_path %}
            {% endif %}
            <li class="masthead__menu-item"><a href="{{ domain }}{{ link.url }}" data-nav-url="{{ link.url }}">{{ link.title }}</a></li>
          {% endfor %}
          <li id="language-toggle" class="masthead__menu-item persist tail">
            <a role="button" aria-label="Toggle language" title="中英文切换">中文</a>
          </li>
          <li id="theme-toggle" class="masthead__menu-item persist tail">
            <a role="button" tabindex="0" aria-label="Toggle theme" data-i18n-attr="title:theme_toggle|aria-label:theme_toggle">
              <i id="theme-icon" class="fa-solid fa-sun" aria-hidden="true" title="Toggle theme"></i>
            </a>
          </li>
        </ul>
        <ul class="hidden-links hidden"></ul>
      </nav>
    </div>
  </div>
</div>
